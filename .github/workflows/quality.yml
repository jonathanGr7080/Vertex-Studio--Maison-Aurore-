name: Quality

on:
  push:
  pull_request:

jobs:
  check:
    name: Typecheck, lint & build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks (typecheck + lint + build)
        run: npm run check
